#
# Mirrors wrhalpin/GNAT's python-typecheck.yml. mypy runs
# informationally (`|| true`) — the strict settings in pyproject.toml
# surface new regressions in the log without blocking merges, matching
# GNAT's convention. Tighten to a hard fail in a separate workflow once
# the codebase is fully clean.

name: Python Type Check

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: python-typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and type deps
        run: |
          pip install -e ".[dev]" || pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy orchestrator/ guest_agent/ linux_guest_agent/ || true
