##
## SandGNAT INetSim overrides. Merge into /etc/inetsim/inetsim.conf on
## the INetSim VM (192.168.100.2); anything this file doesn't mention
## keeps its stock value. See infra/inetsim/README.md for the matching
## OPNsense + netem configuration.
##
## Reload with: systemctl restart inetsim

# ---- Core identity --------------------------------------------------------

# Bind only the analysis-VLAN IP. INetSim must not answer from any
# other interface — an accidental bind to vmbr0 would expose the
# honeypot to the management network.
service_bind_address      192.168.100.2

# Pretend to be a Linux/Apache host rather than "INetSim 1.3.2".
service_run_as_user       inetsim
http_version              1.1
http_fakemode             0
http_fakefile_extensions  txt,html,jpg,jpeg,png,gif,pdf,js,css,xml,json

# ---- HTTP ----------------------------------------------------------------

# Turn on the www-root response directory. Files under
# /var/lib/inetsim/http/wwwroot/<host>/<path> are served verbatim when
# a request matches; anything else falls back to the default fake
# response below.
http_default_fakefile     text/html /etc/inetsim/fakefiles/sample.html 200
http_wwwroot              /var/lib/inetsim/http/wwwroot

# Microsoft NCSI / Connectivity probes. Must match byte-for-byte or
# Windows drops to "limited connectivity" mode.
http_static_file_mapping  /ncsi.txt          /etc/inetsim/static/ncsi.txt
http_static_file_mapping  /connecttest.txt   /etc/inetsim/static/connecttest.txt

# Apple captive-portal probe (Windows occasionally reaches here too if
# Edge has a Safari spoof header).
http_static_file_mapping  /hotspot-detect.html  /etc/inetsim/static/hotspot-detect.html

# ---- HTTPS ---------------------------------------------------------------

# Identical to HTTP. INetSim terminates TLS with a self-signed cert
# by default — fine for commodity malware (most don't pin); sophisticated
# samples that pin will fail here and that's signal for the evasion
# detector (Phase G).
https_version             1.1
https_default_fakefile    text/html /etc/inetsim/fakefiles/sample.html 200
https_wwwroot             /var/lib/inetsim/http/wwwroot

# ---- DNS -----------------------------------------------------------------

# Default A record: every unresolved name points back at the honeypot
# so HTTP/HTTPS to arbitrary hostnames still terminates here.
dns_default_ip            192.168.100.2

# Whitelisted domains are NOT served by INetSim's DNS — OPNsense
# redirects those lookups upstream. We still list them here so the
# forwarded answer flows through INetSim's log (useful post-hoc).
dns_static_forward_zone   /etc/inetsim/static/dns-whitelist.txt

# ---- Other services ------------------------------------------------------

# NTP: realistic current time, not a fixed 1970 epoch. Some malware
# keys on the delta between NTP time and CPU RTC to detect sandboxes
# that fast-forward the clock.
ntp_server_copy           1

# SMTP: swallow and log. Commodity ransomware occasionally tries to
# exfil via SMTP — we keep the response permissive so the sample
# thinks it succeeded.
smtp_service_banner       Postfix smtpd

# Disable the greylisting plugin; introduces multi-second delays that
# make our 3-minute detonation window tight.
smtp_greylisting          0
